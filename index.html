<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }
html, body { width: 100%; background: #1a1a2e; font-family: 'Press Start 2P', monospace; }
#gw { background: #1a1a2e; padding: 16px 12px 12px; width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; }
#startScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; min-height: 80vh; }
#startScreen h2 { color: #ffd700; font-size: 13px; line-height: 2.2; text-align: center; }
#startBtn { background-color: #ffffff !important; color: #000000 !important; border: 4px solid #333; border-radius: 6px; padding: 20px 44px; font-family: 'Press Start 2P', monospace; font-size: 15px; cursor: pointer; box-shadow: 0 5px 0 #555; -webkit-appearance: none; display: block; }
#startBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #555; }
#gameArea { display: none; }
#hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
#score { color: #ffd700; font-size: 13px; }
#hearts { font-size: 14px; }
#lv { color: #aaa; font-size: 13px; }
#scene { 
  background: linear-gradient(#eef0f2 0 58%, #cfd3d6 58% 100%);
  border-radius: 8px;
  padding: 48px 6px 0;
  position: relative;
  overflow: visible;
  border: 3px solid #d9dde0;
}
#scene::before {
  content: '';
  position: absolute;
  left: 18px;
  top: 12px;
  width: 84px;
  height: 32px;
  background: #f9fafb;
  border: 3px solid #d0d5d9;
  box-shadow: 
    188px 0 0 #f9fafb,
    188px 0 0 3px #d0d5d9;
}
#scene::after {
  content: '';
  position: absolute;
  right: 32px;
  top: 22px;
  width: 42px;
  height: 4px;
  background: #6aa4c8;
  box-shadow: 
    0 8px 0 #8fb9d4,
    -56px 0 0 #d6dce2,
    -56px 8px 0 #d6dce2;
  opacity: .95;
}
#desks { display: flex; justify-content: space-around; align-items: flex-end; }
.unit { display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }
.name-tag { font-size: 13px; color: #aaa; margin-bottom: 2px; }
.name-tag.me { color: #ffd700; }
.bubble { position: absolute; top: -4px; left: 50%; transform: translate(-50%,-100%); background: #cfeeff; color: #1b4f72; border-radius: 5px; padding: 3px 6px; font-size: 10px; font-family: sans-serif; white-space: nowrap; opacity: 0; transition: opacity 0.12s; pointer-events: none; z-index: 10; border: 1px solid #6bb8e8; font-weight: bold; }
.bubble::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #6bb8e8; border-bottom: none; }
.bubble.on { opacity: 1; }
.belch-bubble { position: absolute; top: -4px; left: 50%; transform: translate(-50%,-100%); background: #d4f7a0; color: #2a4a00; border-radius: 5px; padding: 3px 6px; font-size: 10px; font-family: sans-serif; white-space: nowrap; opacity: 0; transition: opacity 0.12s; pointer-events: none; z-index: 10; border: 1px solid #7aaa22; font-weight: bold; }
.belch-bubble::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #7aaa22; border-bottom: none; }
.belch-bubble.on { opacity: 1; }
.countdown { position: absolute; top: 0; right: 2px; background: #e24b4a; color: #fff; font-size: 13px; width: 20px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; z-index: 20; pointer-events: none; }
.countdown.on { opacity: 1; }
.char-seat { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  position: relative;
  z-index: 2;
  margin-bottom: -30px;
}
canvas.char { 
  display: block; 
  position: relative; 
  z-index: 2; 
}
.chair { position: relative; width: 40px; margin-top: -8px; z-index: 1; }
.chair-back { position: absolute; left: 1px; top: -18px; width: 7px; height: 21px; background: #181a1f; border-radius: 3px; }
.chair-seat { width: 100%; height: 8px; background: #181a1f; border-top: 3px solid #30343d; border-radius: 3px; }
.chair-legs { display: flex; justify-content: space-between; padding: 0 3px; }
.chair-leg { width: 4px; height: 10px; background: #181a1f; }
.desk { 
  width: 104px;
  height: 26px;
  background: #e7cfaa;
  border-top: 6px solid #f7e4c4;
  border-bottom: 6px solid #ad8656;
  border-radius: 2px;
  margin-top: 0;
  position: relative;
  z-index: 8;
  box-shadow: 0 5px 0 rgba(0,0,0,.2);
}
.desk::before {
  content: '';
  position: absolute;
  right: 8px;
  top: -34px;
  width: 28px;
  height: 24px;
  background: #20242a;
  border: 3px solid #343a43;
  border-radius: 2px;
  box-shadow: inset -4px -4px 0 #111317;
}
.desk::after {
  content: '';
  position: absolute;
  right: 18px;
  top: -8px;
  width: 10px;
  height: 8px;
  background: #343a43;
}
.desk-leg { 
  width: 82px;
  height: 36px;
  margin: 0 auto;
  background: transparent;
  border-left: 6px solid #20242a;
  border-right: 6px solid #20242a;
  position: relative;
  z-index: 1;
}
#floor { 
  height: 34px;
  background: repeating-linear-gradient(90deg,#bfc4c8 0,#bfc4c8 18px,#b6bcc1 18px,#b6bcc1 36px);
  border-top: 4px solid #a8adb2;
  margin-top: 0;
  border-radius: 0 0 8px 8px;
}
#btns { display: flex; gap: 10px; margin-top: 14px; }
.btn { flex: 1; padding: 16px 0; border-radius: 8px; border: 3px solid #2a4a7a; cursor: pointer; background: #0f3460; color: #fff; font-family: 'Press Start 2P', monospace; display: flex; flex-direction: column; align-items: center; gap: 6px; box-shadow: 0 4px 0 #071a33; -webkit-tap-highlight-color: transparent; }
.btn .ico { font-size: 26px; }
.btn .label { font-size: 13px; color: #ccc; }
.btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #071a33; }
.btn.ok { background: #1a7a3a !important; border-color: #2aaa54 !important; }
.btn.fail { background: #7a1a1a !important; border-color: #aa2a2a !important; }
#msg { text-align: center; margin-top: 10px; font-size: 13px; color: #aaa; min-height: 18px; line-height: 1.8; }
#progress { height: 5px; background: #0f3460; margin-top: 8px; border-radius: 3px; overflow: hidden; }
#prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#1a7a3a,#ffd700,#e24b4a); transition: width 0.4s; }
.scene-overlay { position: absolute; inset: 0; background: #1a1a2ef2; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 30; padding: 20px; }
.scene-overlay h2 { color: #ffd700; font-size: 13px; }
.scene-overlay .big { color: #ffd700; font-size: 14px; }
.scene-overlay p { color: #aaa; font-size: 13px; text-align: center; line-height: 2; }
.scene-overlay .go-btn { background-color: #ffffff !important; color: #000000 !important; border: 3px solid #333; border-radius: 6px; padding: 14px 28px; font-family: 'Press Start 2P', monospace; font-size: 11px; cursor: pointer; box-shadow: 0 4px 0 #555; -webkit-appearance: none; }
.scene-overlay .go-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #555; }

.under-legs {
  width: 28px;
  height: 25px;
  margin: -1px auto 0;
  position: relative;
  z-index: 6;
  display: flex;
  justify-content: center;
  gap: 3px;
  pointer-events: none;
}
.under-legs span {
  display: block;
  width: 6px;
  height: 20px;
  background: #2b3242;
  border-bottom: 4px solid #111;
  border-radius: 0 0 2px 2px;
}
.legs-me span { background: #f3b6c6; border-bottom-color: #111; }
.legs-l span { background: #27364a; }
.legs-r span { background: #27364a; }

.under-legs.shake span:first-child {
  animation: legShakeL .12s steps(2) infinite;
}
.under-legs.shake span:last-child {
  animation: legShakeR .12s steps(2) infinite;
}
.under-legs.shake::before,
.under-legs.shake::after {
  content: '';
  position: absolute;
  top: 9px;
  width: 5px;
  height: 12px;
  border-left: 2px solid #6bb8e8;
  border-right: 2px solid #6bb8e8;
  opacity: .9;
}
.under-legs.shake::before { left: -4px; }
.under-legs.shake::after { right: -4px; }

.under-legs.tied {
  gap: 3px;
}
.under-legs.tied::before {
  content: '';
  position: absolute;
  left: 3px;
  right: 3px;
  top: 14px;
  height: 8px;
  border-top: 3px solid #d2a54b;
  border-bottom: 3px solid #d2a54b;
  border-radius: 8px;
  z-index: 8;
}
.under-legs.tied::after {
  content: '';
  position: absolute;
  left: 10px;
  top: 12px;
  width: 7px;
  height: 7px;
  background: #d2a54b;
  border-radius: 50%;
  z-index: 9;
}

@keyframes legShakeL {
  0% { transform: translateX(-2px); }
  100% { transform: translateX(2px); }
}
@keyframes legShakeR {
  0% { transform: translateX(2px); }
  100% { transform: translateX(-2px); }
}


.legs-l { transform: translateX(-2px); }
.legs-me { transform: translateX(1px); }
.legs-r { transform: translateX(-1px); }

</style>
</head>
<body>
<div id="gw">
  <div id="startScreen">
    <h2>🏢 사무실 인내 게임</h2>
    <button id="startBtn" onclick="startGame()">출근하기 🚪</button>
  </div>
  <div id="gameArea">
    <div id="hud">
      <div id="score">0</div>
      <div id="hearts">❤️❤️❤️❤️❤️</div>
      <div id="lv">LV 1</div>
    </div>
    <div id="scene">
      <div id="desks">
        <div class="unit">
          <div class="bubble" id="bL">🦵 떨떨떨!</div>
          <div class="name-tag">동료 A</div>
          <div class="char-seat">
            <canvas class="char" id="cL" width="44" height="52"></canvas>
            <div class="chair"><div class="chair-back"></div><div class="chair-seat"></div><div class="chair-legs"><div class="chair-leg"></div><div class="chair-leg"></div></div></div>
          </div>
          <div class="countdown" id="cdL"></div>
          <div class="desk"></div><div class="under-legs legs-l" id="legL"><span></span><span></span></div><div class="desk-leg"></div>
        </div>
        <div class="unit">
          <div class="bubble" id="bMe"></div>
          <div class="name-tag me">나 👩</div>
          <div class="char-seat">
            <canvas class="char" id="cMe" width="44" height="52"></canvas>
            <div class="chair"><div class="chair-back"></div><div class="chair-seat"></div><div class="chair-legs"><div class="chair-leg"></div><div class="chair-leg"></div></div></div>
          </div>
          <div class="desk"></div><div class="under-legs legs-me" id="legMe"><span></span><span></span></div><div class="desk-leg"></div>
        </div>
        <div class="unit">
          <div class="belch-bubble" id="bR">꺼억~ 🤮</div>
          <div class="name-tag">동료 B</div>
          <div class="char-seat">
            <canvas class="char" id="cR" width="44" height="52"></canvas>
            <div class="chair"><div class="chair-back"></div><div class="chair-seat"></div><div class="chair-legs"><div class="chair-leg"></div><div class="chair-leg"></div></div></div>
          </div>
          <div class="countdown" id="cdR"></div>
          <div class="desk"></div><div class="under-legs legs-r" id="legR"><span></span><span></span></div><div class="desk-leg"></div>
        </div>
      </div>
      <div id="floor"></div>
      <div class="scene-overlay" id="overScr" style="display:none;">
        <h2>😮‍💨 퇴근</h2>
        <div class="big" id="finalScore"></div>
        <p id="overMsg"></p>
        <button class="go-btn" onclick="startGame()">다시 출근 😔</button>
      </div>
    </div>
    <div id="btns">
      <button class="btn" id="btnL" onclick="press('L')"><span class="ico">🦵</span><span class="label">째려보기</span></button>
      <button class="btn" id="btnR" onclick="press('R')"><span class="ico">👄</span><span class="label">입냄새</span></button>
    </div>
    <div id="msg"></div>
    <div id="progress"><div id="prog-fill"></div></div>
  </div>
</div>
<script>
let hp=5,score=0,lv=1,active=false,combo=0;
let stateL='idle',stateR='idle';
let timerL=null,timerR=null,raf=null,tick=0;
let ropeApplied=false,bandApplied=false,belchPhase=0;
let ropeCI=null,bandCI=null;
const $=id=>document.getElementById(id);
function px(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

function drawBase(ctx,shirt,hair,sway,face,isMe){
  ctx.clearRect(0,0,44,52);
  const ox=4,oy=1;

  // legs below desk line
  px(ctx,ox+4,oy+33,7,13,'#222633');
  px(ctx,ox+14,oy+33,7,13,'#222633');
  px(ctx,ox+1,oy+46,10+sway,5,'#151515');
  px(ctx,ox+13,oy+46,10-sway,5,'#151515');

  // seated body above desk line
  px(ctx,ox+2,oy+18,20,16,shirt);
  px(ctx,ox+0,oy+20,4,10,shirt);
  px(ctx,ox+22,oy+20,4,10,shirt);
  px(ctx,ox+0,oy+29,4,4,'#F4C89B');
  px(ctx,ox+22,oy+29,4,4,'#F4C89B');

  // neck and face
  px(ctx,ox+8,oy+14,6,5,'#F4C89B');
  px(ctx,ox+5,oy+3,14,13,'#F4C89B');

  // hair
  if(isMe){
    px(ctx,ox+3,oy+1,18,5,hair);
    px(ctx,ox+2,oy+5,4,12,hair);
    px(ctx,ox+18,oy+5,4,12,hair);
    px(ctx,ox+5,oy+0,14,4,hair);
  }else{
    px(ctx,ox+5,oy+0,14,5,hair);
    px(ctx,ox+3,oy+2,4,7,hair);
    px(ctx,ox+17,oy+2,4,7,hair);
  }
  px(ctx,ox+3,oy+7,3,4,'#e8b882');
  px(ctx,ox+18,oy+7,3,4,'#e8b882');

  // face
  if(face==='stare'){
    px(ctx,ox+6,oy+8,4,2,'#222');px(ctx,ox+14,oy+8,4,2,'#222');
    px(ctx,ox+7,oy+6,3,2,'#e24b4a');px(ctx,ox+15,oy+6,3,2,'#e24b4a');
  }else if(face==='shocked'){
    px(ctx,ox+6,oy+6,4,6,'#222');px(ctx,ox+8,oy+7,1,4,'#fff');
    px(ctx,ox+14,oy+6,4,6,'#222');px(ctx,ox+16,oy+7,1,4,'#fff');
    px(ctx,ox+8,oy+14,5,2,'#933');
  }else if(face==='belch'){
    px(ctx,ox+6,oy+8,4,2,'#222');px(ctx,ox+14,oy+8,4,2,'#222');
    px(ctx,ox+4,oy+10,3,4,'#f0a0a0');px(ctx,ox+17,oy+10,3,4,'#f0a0a0');
    px(ctx,ox+8,oy+13,7,3,'#222');px(ctx,ox+9,oy+14,5,2,'#cc4444');
  }else{
    px(ctx,ox+6,oy+8,4,3,'#222');px(ctx,ox+14,oy+8,4,3,'#222');
    px(ctx,ox+7,oy+9,1,1,'#fff');px(ctx,ox+15,oy+9,1,1,'#fff');
    px(ctx,ox+8,oy+13,5,2,'#c4846a');
  }
}
function drawShakeLines(ctx){
  const ox=4,oy=1;
  ctx.strokeStyle='#1f4e79';
  ctx.lineWidth=1.5;
  ctx.setLineDash([]);

  // left leg vibration marks
  ctx.beginPath(); ctx.moveTo(ox+0,oy+36); ctx.lineTo(ox-3,oy+34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox+1,oy+42); ctx.lineTo(ox-3,oy+44); ctx.stroke();

  // right leg vibration marks
  ctx.beginPath(); ctx.moveTo(ox+25,oy+36); ctx.lineTo(ox+29,oy+34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox+24,oy+42); ctx.lineTo(ox+29,oy+44); ctx.stroke();

  // little floor vibration pixels
  px(ctx,ox+4,oy+49,3,2,'#6bb8e8');
  px(ctx,ox+18,oy+49,3,2,'#6bb8e8');
}
function drawRope(ctx){
  const ox=4,oy=1;
  // rope clearly around shaking legs, below the desk
  ctx.strokeStyle='#d2a54b';
  ctx.lineWidth=2;
  ctx.setLineDash([2,2]);
  ctx.beginPath();
  ctx.moveTo(ox+1,oy+39);
  ctx.bezierCurveTo(ox+2,oy+45,ox+23,oy+45,ox+24,oy+39);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='#8a5a15';
  ctx.beginPath();
  ctx.moveTo(ox+4,oy+42);
  ctx.lineTo(ox+22,oy+42);
  ctx.stroke();
  ctx.fillStyle='#d2a54b';
  ctx.beginPath();
  ctx.arc(ox+13,oy+42,3,0,Math.PI*2);
  ctx.fill();
}
function drawBand(ctx){
  const ox=4,oy=1;
  // X band directly over the mouth
  px(ctx,ox+6,oy+11,12,6,'#f5d4a2');
  ctx.strokeStyle='#cc2222';
  ctx.lineWidth=2;
  ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(ox+7,oy+12);ctx.lineTo(ox+17,oy+16);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox+17,oy+12);ctx.lineTo(ox+7,oy+16);ctx.stroke();
}
function drawTie(ctx,color){
  const ox=4,oy=1;
  const tie=color||'#263c5c';
  px(ctx,ox+10,oy+18,4,4,tie);
  px(ctx,ox+9,oy+22,6,9,tie);
  px(ctx,ox+8,oy+18,2,3,'#dfe6ee');
  px(ctx,ox+14,oy+18,2,3,'#dfe6ee');
}
function drawMe(f){
  const c=$('cMe').getContext('2d');
  drawBase(c,'#f3b6c6','#1b1b1b',0,f||'normal',true);
  drawTie(c,'#7a2341');
}
function drawL(s){
  const c=$('cL').getContext('2d');
  drawBase(c,'#9fc5e8','#2b211b',s||0,'normal',false);
  drawTie(c,'#1f4e79');
  if(stateL==='shaking')drawShakeLines(c);
  if(ropeApplied)drawRope(c);
}
function drawR(b){
  const c=$('cR').getContext('2d');
  drawBase(c,'#b6d7a8','#39251d',0,b?'belch':'normal',false);
  drawTie(c,'#38761d');
  if(bandApplied)drawBand(c);
}
function setCD(side,sec){const el=$(side==='L'?'cdL':'cdR');if(sec>0){el.textContent=sec;el.classList.add('on');}else{el.classList.remove('on');}}
function applyRope(){ropeApplied=true;$('legL').classList.add('tied');$('legL').classList.remove('shake');let cd=3;setCD('L',cd);clearInterval(ropeCI);ropeCI=setInterval(()=>{cd--;setCD('L',cd);if(cd<=0){clearInterval(ropeCI);ropeApplied=false;$('legL').classList.remove('tied');$('msg').textContent='다리 밧줄이 풀렸다! 💢';}},1000);}
function applyBand(){bandApplied=true;let cd=3;setCD('R',cd);clearInterval(bandCI);bandCI=setInterval(()=>{cd--;setCD('R',cd);if(cd<=0){clearInterval(bandCI);bandApplied=false;$('msg').textContent='입 X밴드가 풀렸다! 💢';}},1000);}
function setBubble(id,on){$(id).classList.toggle('on',on);}
function baseInterval(){return Math.max(2200,5200-(lv-1)*280)+Math.random()*1800;}
function winMs(){return Math.max(900,2000-(lv-1)*80);}
function schedL(){if(!active)return;timerL=setTimeout(()=>{if(!active)return;stateL='shaking';setBubble('bL',true);timerL=setTimeout(()=>{if(!active)return;if(stateL==='shaking'){stateL='idle';setBubble('bL',false);missHp('놓쳤다...');}schedL();},winMs());},baseInterval());}
function schedR(){if(!active)return;timerR=setTimeout(()=>{if(!active)return;stateR='belching';setBubble('bR',true);timerR=setTimeout(()=>{if(!active)return;if(stateR==='belching'){stateR='idle';setBubble('bR',false);missHp('참아버렸다...');}schedR();},winMs());},baseInterval()+800);}
function animate(){tick++;const sw=stateL==='shaking'?Math.round(Math.sin(tick*0.75)*7):0;if(stateR==='belching')belchPhase+=0.3;else belchPhase=0;drawL(sw);$('legL').classList.toggle('shake',stateL==='shaking'&&!ropeApplied);drawR(stateR==='belching');if(stateR==='belching'){const c=$('cR').getContext('2d');const img=c.getImageData(0,0,44,52);c.clearRect(0,0,44,52);c.putImageData(img,0,Math.round(Math.sin(belchPhase)*2));}raf=requestAnimationFrame(animate);}
function press(side){if(!active)return;const btn=$(side==='L'?'btnL':'btnR');if(side==='L'&&stateL==='shaking'){clearTimeout(timerL);stateL='idle';setBubble('bL',false);applyRope();doHit(btn,'다리 묶음! 3초 후 풀림');schedL();}else if(side==='R'&&stateR==='belching'){clearTimeout(timerR);stateR='idle';setBubble('bR',false);applyBand();doHit(btn,'입 X밴드! 3초 후 풀림');schedR();}else{combo=0;hp--;updateHp();btn.classList.add('fail');setTimeout(()=>btn.classList.remove('fail'),300);$('msg').textContent=side==='L'?'멀쩡한데 왜 째려봐':'아직 안 꼈는데';drawMe('shocked');setTimeout(()=>drawMe('normal'),600);if(hp<=0)endGame();}}
function doHit(btn,msg){combo++;score+=combo>=3?20:10;$('score').textContent=score;lv=Math.min(10,Math.floor(score/150)+1);$('lv').textContent='LV '+lv;$('prog-fill').style.width=Math.min(100,score/15)+'%';$('msg').textContent=combo>=3?msg+' x'+combo+'콤보!':msg;btn.classList.add('ok');setTimeout(()=>btn.classList.remove('ok'),280);drawMe('stare');setTimeout(()=>drawMe('normal'),450);}
function missHp(msg){combo=0;hp--;updateHp();$('msg').textContent=msg;drawMe('shocked');setTimeout(()=>drawMe('normal'),700);if(hp<=0)endGame();}
function updateHp(){$('hearts').textContent=[0,1,2,3,4].map(i=>i<hp?'❤️':'🖤').join('');}
function endGame(){active=false;cancelAnimationFrame(raf);clearTimeout(timerL);clearTimeout(timerR);clearInterval(ropeCI);clearInterval(bandCI);stateL='idle';stateR='idle';$('legL').classList.remove('shake','tied');setBubble('bL',false);setBubble('bR',false);setCD('L',0);setCD('R',0);$('finalScore').textContent='SCORE: '+score;const msgs=['오늘도 퇴직을 참았습니다.','이어폰이라도 끼세요.','재택근무를 신청하세요.','인내심 레전드.'];$('overMsg').textContent=msgs[score>300?3:score>150?2:score>60?1:0];$('overScr').style.display='flex';}
function startGame(){hp=5;score=0;lv=1;combo=0;tick=0;active=true;ropeApplied=false;bandApplied=false;$('legL').classList.remove('shake','tied');belchPhase=0;clearInterval(ropeCI);clearInterval(bandCI);stateL='idle';stateR='idle';$('legL').classList.remove('shake','tied');setBubble('bL',false);setBubble('bR',false);setCD('L',0);setCD('R',0);updateHp();$('score').textContent='0';$('lv').textContent='LV 1';$('prog-fill').style.width='0%';$('msg').textContent='';$('startScreen').style.display='none';$('gameArea').style.display='block';$('overScr').style.display='none';cancelAnimationFrame(raf);drawMe('normal');drawL(0);drawR(false);animate();schedL();schedR();}
</script>
